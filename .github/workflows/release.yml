name: Preparar release

on:
  workflow_dispatch:
    inputs:
      versao:
        description: Versão SemVer presente no package.json
        required: true
        type: string
      incluir_windows:
        description: Incluir instalador Windows x64
        required: true
        default: true
        type: boolean
      incluir_linux:
        description: Incluir AppImage e DEB Linux x64
        required: true
        default: true
        type: boolean
      incluir_macos:
        description: Incluir DMG e ZIP macOS x64 e arm64 experimentais
        required: true
        default: true
        type: boolean
      confirmacao_plataformas_omitidas:
        description: Digite CONFIRMO se alguma plataforma for omitida
        required: false
        type: string
      modo:
        description: Criar nova release ou retomar um rascunho limpo da mesma versão
        required: true
        default: criar
        type: choice
        options:
          - criar
          - retomar

permissions:
  contents: read

concurrency:
  group: release-producao
  cancel-in-progress: false

jobs:
  validar:
    name: Validar solicitação
    runs-on: ubuntu-latest
    outputs:
      versao: ${{ steps.solicitacao.outputs.versao }}
      commit: ${{ steps.estado.outputs.commit }}
    steps:
      - name: Obter código
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar solicitação
        id: solicitacao
        env:
          VERSAO: ${{ inputs.versao }}
          INCLUIR_WINDOWS: ${{ inputs.incluir_windows }}
          INCLUIR_LINUX: ${{ inputs.incluir_linux }}
          INCLUIR_MACOS: ${{ inputs.incluir_macos }}
          CONFIRMACAO_PLATAFORMAS_OMITIDAS: ${{ inputs.confirmacao_plataformas_omitidas }}
          MODO: ${{ inputs.modo }}
        run: |
          node scripts/release/validar-solicitacao.mjs
          echo "versao=$VERSAO" >> "$GITHUB_OUTPUT"

      - name: Validar estado da tag e release
        id: estado
        env:
          GH_TOKEN: ${{ github.token }}
          VERSAO: ${{ inputs.versao }}
          MODO: ${{ inputs.modo }}
        run: |
          if [ "$MODO" = criar ]; then
            ! gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/v$VERSAO" --silent
            ! gh release view "v$VERSAO" --repo "$GITHUB_REPOSITORY" --json id --jq .id
            echo "commit=$GITHUB_SHA" >> "$GITHUB_OUTPUT"
          else
            git fetch --tags --force origin "refs/tags/v$VERSAO:refs/tags/v$VERSAO"
            commit="$(git rev-list -n 1 "v$VERSAO")"
            test -n "$commit"
            echo "commit=$commit" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    name: Build Windows x64
    needs: validar
    if: ${{ inputs.incluir_windows }}
    runs-on: windows-latest
    steps:
      - name: Obter código
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.0.2
        with:
          ref: ${{ needs.validar.outputs.commit }}

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar instalador
        run: npm run build; npx electron-builder --win --x64 --publish never

      - name: Enviar artefatos temporários
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ needs.validar.outputs.versao }}-windows-x64
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          if-no-files-found: error

  build-linux:
    name: Build Linux x64
    needs: validar
    if: ${{ inputs.incluir_linux }}
    runs-on: ubuntu-latest
    steps:
      - name: Obter código
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.0.2
        with:
          ref: ${{ needs.validar.outputs.commit }}

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar pacotes
        run: npm run build && npx electron-builder --linux --x64 --publish never

      - name: Enviar artefatos temporários
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ needs.validar.outputs.versao }}-linux-x64
          path: |
            dist/*.AppImage
            dist/*.AppImage.blockmap
            dist/*.deb
            dist/latest-linux.yml
          if-no-files-found: error

  build-macos-x64:
    name: Build macOS x64
    needs: validar
    if: ${{ inputs.incluir_macos }}
    runs-on: macos-latest
    steps:
      - name: Obter código
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.0.2
        with:
          ref: ${{ needs.validar.outputs.commit }}

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar pacotes
        run: npm run build && npx electron-builder --mac --x64 --publish never

      - name: Enviar artefatos temporários
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ needs.validar.outputs.versao }}-macos-x64
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  build-macos-arm64:
    name: Build macOS arm64
    needs: validar
    if: ${{ inputs.incluir_macos }}
    runs-on: macos-latest
    steps:
      - name: Obter código
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.0.2
        with:
          ref: ${{ needs.validar.outputs.commit }}

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar pacotes
        run: npm run build && npx electron-builder --mac --arm64 --publish never

      - name: Enviar artefatos temporários
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-${{ needs.validar.outputs.versao }}-macos-arm64
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  agregar-release:
    name: Assinar e criar rascunho
    needs:
      - validar
      - build-windows
      - build-linux
      - build-macos-x64
      - build-macos-arm64
    if: ${{ always() && needs.validar.result == 'success' && (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') && (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') && (needs.build-macos-x64.result == 'success' || needs.build-macos-x64.result == 'skipped') && (needs.build-macos-arm64.result == 'success' || needs.build-macos-arm64.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Obter código
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.0.2
        with:
          ref: ${{ needs.validar.outputs.commit }}

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Confirmar rascunho vazio para retomada
        if: ${{ inputs.modo == 'retomar' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSAO: ${{ needs.validar.outputs.versao }}
        run: |
          test "$(gh release view "v$VERSAO" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" = true
          test "$(gh release view "v$VERSAO" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets | length')" = 0

      - name: Baixar artefatos temporários
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: release-${{ needs.validar.outputs.versao }}-*
          path: artefatos

      - name: Criar ou confirmar tag imutável
        env:
          VERSAO: ${{ needs.validar.outputs.versao }}
          MODO: ${{ inputs.modo }}
        run: |
          if [ "$MODO" = criar ]; then
            git tag "v$VERSAO" "${{ needs.validar.outputs.commit }}"
            git push origin "v$VERSAO"
          else
            git fetch --tags --force origin "refs/tags/v$VERSAO:refs/tags/v$VERSAO"
            test "$(git rev-list -n 1 "v$VERSAO")" = "${{ needs.validar.outputs.commit }}"
          fi

      - name: Gerar manifesto assinado
        env:
          CHAVE_PRIVADA_ASSINATURA: ${{ secrets.CHAVE_PRIVADA_ASSINATURA }}
          VERSAO: ${{ needs.validar.outputs.versao }}
        run: |
          node scripts/release/gerar-manifesto.mjs \
            --diretorio artefatos \
            --versao "$VERSAO" \
            --commit "${{ needs.validar.outputs.commit }}" \
            --versao-schema 30 \
            --url-release "https://github.com/$GITHUB_REPOSITORY/releases/download/v$VERSAO" \
            --saida publicacao/manifesto.json \
            --assinatura publicacao/manifesto.json.sig

      - name: Gerar rascunho das notas da release
        env:
          VERSAO: ${{ needs.validar.outputs.versao }}
        run: |
          cat > publicacao/notas-release.md <<EOF
          # laWdo v$VERSAO

          > Release em rascunho. Complete as notas antes da promoção.

          ## Resumo

          PENDENTE

          ## Alterações

          - PENDENTE

          ## Correções

          - PENDENTE

          ## Dados, backup e compatibilidade

          - Schema: PENDENTE.
          - Migration: PENDENTE.
          - Backup: PENDENTE.

          ## Limitações conhecidas

          - PENDENTE
          EOF

      - name: Criar release em rascunho
        env:
          GH_TOKEN: ${{ github.token }}
          VERSAO: ${{ needs.validar.outputs.versao }}
          MODO: ${{ inputs.modo }}
        run: |
          mapfile -t assets < <(find artefatos -type f \( -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.dmg' -o -name '*.zip' -o -name '*.blockmap' -o -name 'latest.yml' -o -name 'latest-linux.yml' \); find publicacao -type f)
          if [ "$MODO" = criar ]; then
            gh release create "v$VERSAO" --repo "$GITHUB_REPOSITORY" --draft --title "laWdo v$VERSAO" --notes-file publicacao/notas-release.md "${assets[@]}"
          else
            gh release edit "v$VERSAO" --repo "$GITHUB_REPOSITORY" --title "laWdo v$VERSAO" --notes-file publicacao/notas-release.md
            gh release upload "v$VERSAO" --repo "$GITHUB_REPOSITORY" "${assets[@]}"
          fi
