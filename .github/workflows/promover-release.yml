name: Promover release

on:
  workflow_dispatch:
    inputs:
      versao:
        description: Versão SemVer do rascunho a publicar
        required: true
        type: string
      modo:
        description: Promover, reprocessar o feed ou suspender uma release publicada
        required: true
        default: promover
        type: choice
        options:
          - promover
          - reprocessar-feed
          - suspender
      motivo_suspensao:
        description: Motivo público e sucinto da suspensão (obrigatório no modo suspender)
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-producao
  cancel-in-progress: false

jobs:
  validar-publicar-gerar-feed:
    name: Validar, publicar e assinar feed
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Obter código
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.0.2
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar identidade e rascunho
        env:
          GH_TOKEN: ${{ github.token }}
          VERSAO: ${{ inputs.versao }}
          MODO: ${{ inputs.modo }}
          MOTIVO_SUSPENSAO: ${{ inputs.motivo_suspensao }}
        run: |
          test "$GITHUB_REF" = 'refs/heads/main'
          test "$(node -p "require('./package.json').version")" = "$VERSAO"
          gh release view "v$VERSAO" --repo "$GITHUB_REPOSITORY" --json tagName,targetCommitish,isDraft,isPrerelease,assets,body > release.json
          test "$(jq -r .tagName release.json)" = "v$VERSAO"
          test "$(jq -r .isPrerelease release.json)" = false
          git fetch --tags --force origin "refs/tags/v$VERSAO:refs/tags/v$VERSAO"
          commit_tag="$(git rev-list -n 1 "v$VERSAO")"
          commit_alvo="$(jq -r .targetCommitish release.json)"
          if [[ "$commit_alvo" =~ ^[0-9a-f]{40}$ ]]; then
            test "$commit_tag" = "$commit_alvo"
          fi
          if [ "$MODO" = promover ]; then test "$(jq -r .isDraft release.json)" = true; fi
          if [ "$MODO" = reprocessar-feed ]; then test "$(jq -r .isDraft release.json)" = false; fi
          if [ "$MODO" = suspender ]; then
            test "$(jq -r .isDraft release.json)" = false
            test -n "$MOTIVO_SUSPENSAO"
          fi
          jq .assets release.json > assets.json
          jq -r .body release.json > notas-release.md
          mkdir rascunho
          gh release download "v$VERSAO" --repo "$GITHUB_REPOSITORY" --dir rascunho --pattern 'manifesto.json' --pattern 'manifesto.json.sig'
          node scripts/release/validar-promocao.mjs \
            --versao "$VERSAO" \
            --manifesto rascunho/manifesto.json \
            --assinatura rascunho/manifesto.json.sig \
            --notas notas-release.md \
            --assets assets.json

      - name: Publicar release validada
        if: ${{ inputs.modo == 'promover' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSAO: ${{ inputs.versao }}
        run: gh release edit "v$VERSAO" --repo "$GITHUB_REPOSITORY" --draft=false

      - name: Registrar suspensão no histórico da release
        if: ${{ inputs.modo == 'suspender' }}
        env:
          GH_TOKEN: ${{ github.token }}
          VERSAO: ${{ inputs.versao }}
          MOTIVO_SUSPENSAO: ${{ inputs.motivo_suspensao }}
        run: |
          if grep --fixed-strings --quiet '<!-- lawdo:suspensa-do-feed -->' notas-release.md; then
            echo "A release v$VERSAO já está suspensa do feed."
            exit 0
          fi
          {
            printf '\n\n## Aviso de suspensão do feed\n\n'
            printf 'Esta release foi suspensa do feed automático em %s.\n\n' "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'Motivo: %s\n\n' "$MOTIVO_SUSPENSAO"
            printf '<!-- lawdo:suspensa-do-feed -->\n'
          } >> notas-release.md
          gh release edit "v$VERSAO" --repo "$GITHUB_REPOSITORY" --notes-file notas-release.md

      - name: Baixar manifestos das releases publicadas
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir releases-publicadas
          while IFS= read -r tag; do
            mkdir "releases-publicadas/$tag"
            gh release download "$tag" --repo "$GITHUB_REPOSITORY" --dir "releases-publicadas/$tag" --pattern 'manifesto.json' --pattern 'manifesto.json.sig'
            if gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body --jq .body | grep --fixed-strings --quiet '<!-- lawdo:suspensa-do-feed -->'; then
              touch "releases-publicadas/$tag/.suspensa"
            fi
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,isDraft --jq '.[] | select(.isDraft == false) | .tagName')

      - name: Gerar feed completo assinado
        env:
          CHAVE_PRIVADA_ASSINATURA: ${{ secrets.CHAVE_PRIVADA_ASSINATURA }}
        run: node scripts/release/gerar-feed.mjs --diretorio releases-publicadas --saida feed

      - name: Enviar feed assinado para Pages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: feed-assinado
          path: feed
          if-no-files-found: error

  preparar-pages:
    name: Preparar artefato do Pages
    needs: validar-publicar-gerar-feed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Configurar Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Baixar feed assinado
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: feed-assinado
          path: feed

      - name: Enviar artefato estático
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: feed

  implantar-pages:
    name: Implantar e registrar feed
    needs: preparar-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.implantacao.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Implantar Pages
        id: implantacao
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Baixar feed assinado para verificação
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: feed-assinado
          path: feed

      - name: Verificar feed implantado por HTTPS
        env:
          URL_FEED: ${{ steps.implantacao.outputs.page_url }}
        run: |
          test -n "$URL_FEED"
          while IFS= read -r arquivo; do
            destino="remoto/${arquivo#feed/}"
            mkdir -p "$(dirname "$destino")"
            curl --fail --location --retry 6 --retry-all-errors "$URL_FEED/${arquivo#feed/}" --output "$destino"
            cmp --silent "$arquivo" "$destino"
          done < <(find feed -type f | sort)
          echo "Feed implantado e verificado em $URL_FEED"
