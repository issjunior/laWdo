name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  qualidade:
    name: Qualidade
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: TypeScript
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Testes
        run: npm test

      - name: Cobertura
        run: npm run test:coverage
